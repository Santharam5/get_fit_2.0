spring:
  application:
    name: get_fit
  datasource:
    url: jdbc:postgresql://localhost:5432/get_fit
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
      show-sql: true